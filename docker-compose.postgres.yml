version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    # environment:
    #   Variables are loaded from .env.postgres via env_file directly
    #   (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB)
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - db_net

volumes:
  postgres_data:

networks:
  db_net:
    driver: bridge
